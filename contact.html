<!DOCTYPE html>
<html lang="uk">
<head><meta charset="UTF-8"><title>Контакти</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}
button {
    background-color: #28a745;
    color: white;
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background-color: #218838;
    transform: scale(1.1);
}
.review {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    display: inline-block;
    width: 250px;
}
.review img {
    width: 50px;
    border-radius: 50%;
}
</style>
</head>
<body>
<h1>Контакти</h1>
<p>Ведіть свій адрес та ім'я й зв'яжіться з нами</p>
<form>
<input type="text" placeholder="Ім'я"><br><br>
<input type="text" placeholder="Адреса"><br><br>
<input type="email" placeholder="Email"><br><br>
<button type="submit">Відправити</button>
</form>
<button onclick="location.href='index.html'">Назад</button>
</body></html>
